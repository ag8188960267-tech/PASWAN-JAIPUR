<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAWAN JAIPUR BEST TIPPER™ | Premium Cricket Predictions</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{font-family:'Inter',sans-serif; margin:0; padding:0; box-sizing:border-box;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#111827,#020617);
color:white;
overflow:hidden;
}

/* Premium Card */
.card{
position:relative;
background:rgba(17,24,39,0.85);
border:1px solid rgba(255,255,255,0.08);
border-radius:25px;
padding:50px 35px;
width:95%;
max-width:450px;
text-align:center;
box-shadow:0 25px 70px rgba(0,0,0,0.7);
overflow:hidden;
transition:0.3s;
}

.card::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle at center,#facc15 0%,transparent 70%);
opacity:0.1;
animation:rotateGradient 20s linear infinite;
}

@keyframes rotateGradient{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* Badge */
.badge{
display:inline-block;
background:rgba(234,179,8,0.2);
color:#facc15;
padding:6px 18px;
border-radius:50px;
font-size:13px;
font-weight:700;
letter-spacing:1px;
margin-bottom:20px;
border:1px solid rgba(234,179,8,0.5);
text-shadow:0 0 8px #facc15;
animation:badgeGlow 2s ease-in-out infinite alternate;
}

@keyframes badgeGlow{
0%{text-shadow:0 0 4px #facc15;}
100%{text-shadow:0 0 12px #facc15;}
}

/* Title */
.title{
font-size:36px;
font-weight:800;
letter-spacing:1px;
background:linear-gradient(90deg,#facc15,#eab308,#facc15);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:textGlow 3s ease-in-out infinite alternate;
}

@keyframes textGlow{
0%{filter:drop-shadow(0 0 4px #facc15);}
100%{filter:drop-shadow(0 0 20px #facc15);}
}

.subtitle{
color:#9ca3af;
font-size:15px;
margin-top:8px;
}

/* Divider */
.divider{
height:1px;
background:rgba(255,255,255,0.08);
margin:30px 0;
}

/* Stats */
.stats{ text-align:left; font-size:15px; }
.stat-item{ display:flex; justify-content:space-between; padding:12px 0; }
.highlight{ color:#facc15; font-weight:700; }

/* Join Button */
.join-btn{
margin-top:35px;
background:linear-gradient(135deg,#facc15,#eab308,#facc15);
color:black;
font-weight:700;
padding:18px;
border-radius:12px;
text-decoration:none;
display:block;
transition:.4s;
box-shadow:0 12px 30px rgba(250,204,21,0.4);
position:relative;
overflow:hidden;
}

.join-btn:hover{
transform:translateY(-6px);
box-shadow:0 18px 45px rgba(250,204,21,0.6);
}

.join-btn::after{
content:"";
position:absolute;
top:0; left:-100%;
width:200%; height:100%;
background:linear-gradient(120deg, rgba(255,255,255,0.3), rgba(255,255,255,0));
transform:skewX(-20deg);
transition:.5s;
}

.join-btn:hover::after{
left:-20%;
}

/* Footer */
.footer{ font-size:12px; color:#6b7280; margin-top:25px; text-align:center; }

/* Animated Counter */
#counter{
display:inline-block;
position:relative;
}

/* Sparkle Effect for Counter */
#counter::after{
content:"+";
position:absolute;
top:-10px;
right:-15px;
color:#facc15;
font-weight:800;
animation:sparkle 1.5s ease-in-out infinite;
}

@keyframes sparkle{
0%,100%{transform:scale(1) rotate(0deg);}
50%{transform:scale(1.3) rotate(15deg);}
}
</style>
</head>

<body>

<div class="card">

<div class="badge">LIVE MATCH ANALYSIS</div>

<div class="title">PAWAN JAIPUR BEST TIPPER™</div>
<div class="subtitle">Accurate Cricket Predictions & Premium Insights</div>

<div class="divider"></div>

<div class="stats">
<div class="stat-item">
<span>IPL 2024 Accuracy</span>
<span class="highlight">68 / 74 Wins</span>
</div>
<div class="stat-item">
<span>Professional Experience</span>
<span>12+ Years</span>
</div>
<div class="stat-item">
<span>Active Members</span>
<span id="counter" class="highlight">10,234</span>
</div>
</div>

<a href="https://t.me/+RS5stffAvrI0NGRl" target="_blank" class="join-btn">
JOIN OFFICIAL TELEGRAM CHANNEL
</a>

<div class="footer">
Trusted by thousands of cricket followers • 100% Free Updates
</div>

</div>

<script>
let count = 10234;
setInterval(()=>{
count += Math.floor(Math.random()*3)+1; // Random increment 1-3 for realism
document.getElementById("counter").innerText = count.toLocaleString();
},3000);
</script>

</body>
</html>
